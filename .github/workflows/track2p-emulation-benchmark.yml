name: Track2p policy emulation benchmark

on:
  # checkov:skip=CKV_GHA_7: Manual diagnostic workflow intentionally exposes bounded dispatch inputs and produces only benchmark artifacts.
  workflow_dispatch:
    inputs:
      raw_data_path:
        description: "Raw pre-Track2p Suite2p data directory"
        type: string
        default: track2p-raw-data
        required: true
      metadata_data_path:
        description: "Track2p/ground-truth metadata data directory"
        type: string
        default: track2p-data
        required: true
      transform_type:
        description: "Registration transform for the emulation"
        type: choice
        options:
          - affine
          - rigid
          - fov-affine
          - fov-translation
          - none
        default: affine
        required: true
      threshold_method:
        description: "Assigned-IoU thresholding method"
        type: choice
        options:
          - otsu
          - min
        default: otsu
        required: true
      iou_distance_threshold:
        description: "Track2p-style centroid gate before IoU computation"
        type: string
        default: "16"
        required: true
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
        required: true
      runner:
        description: "Runner label"
        type: string
        default: self-hosted
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install BayesCaTrack
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<3"
          python -m pip install -e ".[track2p]"

      - name: Restore or download raw pre-Track2p Suite2p data
        uses: ./.github/actions/setup-longitudinaltracking-data
        with:
          data_path: ${{ inputs.raw_data_path }}
          cache_key: longitudinaltrackingraw-webdav-${{ inputs.raw_data_path }}-spatial-v3
          webdav_url: ${{ secrets.LONGITUDINALTRACKINGRAW_WEBDAV_URL }}
          webdav_user: ${{ secrets.LONGITUDINALTRACKINGRAW_DATA_KEY }}
          webdav_password: ${{ secrets.LONGITUDINALTRACKINGRAW_DATA_PASSWORD }}
          required_file_name: stat.npy
          rclone_filter_rules: |
            + **/suite2p/plane0/stat.npy
            + **/suite2p/plane0/iscell.npy
            + **/suite2p/plane0/ops.npy
            + **/track2p/track_ops.npy
            + **/track2p/plane0_suite2p_indices.npy
            - **

      - name: Restore or download Track2p metadata data
        uses: ./.github/actions/setup-longitudinaltracking-data
        with:
          data_path: ${{ inputs.metadata_data_path }}
          cache_key: longitudinaltracking-webdav-${{ inputs.metadata_data_path }}-metadata-v2
          webdav_url: ${{ secrets.LONGITUDINALTRACKING_WEBDAV_URL }}
          webdav_user: ${{ secrets.LONGITUDINALTRACKING_DATA_KEY }}
          webdav_password: ${{ secrets.LONGITUDINALTRACKING_DATA_PASSWORD }}
          required_file_name: ground_truth.csv
          rclone_filter_rules: |
            + **/ground_truth.csv
            - **

      - name: Prepare raw Suite2p benchmark tree
        run: |
          mkdir -p results
          python -m bayescatrack.experiments.track2p_raw_benchmark_data \
            --raw-root "${{ inputs.raw_data_path }}" \
            --metadata-root "${{ inputs.metadata_data_path }}" \
            --output benchmark-raw-suite2p-subjects \
            --diagnostics-dir results \
            --min-subjects 1

      - name: Run Track2p policy emulation
        run: |
          python -m bayescatrack.experiments.track2p_emulation_benchmark \
            --data benchmark-raw-suite2p-subjects \
            --reference benchmark-raw-suite2p-subjects \
            --reference-kind manual-gt \
            --input-format suite2p \
            --transform-type "${{ inputs.transform_type }}" \
            --threshold-method "${{ inputs.threshold_method }}" \
            --iou-distance-threshold "${{ inputs.iou_distance_threshold }}" \
            --output results/track2p_policy_emulation.csv \
            --comparison-output results/track2p_policy_emulation.md

      - name: Run Track2p policy DP benchmarks
        run: |
          python .github/scripts/run_track2p_policy_dp.py \
            --data benchmark-raw-suite2p-subjects \
            --reference benchmark-raw-suite2p-subjects \
            --reference-kind manual-gt \
            --input-format suite2p \
            --transform-type "${{ inputs.transform_type }}" \
            --threshold-method "${{ inputs.threshold_method }}" \
            --iou-distance-threshold "${{ inputs.iou_distance_threshold }}" \
            --cell-probability-threshold 0.5 \
            --output-dir results/policy_dp

      - name: Add comparison to job summary
        if: always() && hashFiles('results/track2p_policy_emulation.md') != ''
        run: |
          {
            echo "## Track2p policy emulation"
            echo "transform_type: ${{ inputs.transform_type }}"
            echo "threshold_method: ${{ inputs.threshold_method }}"
            echo "iou_distance_threshold: ${{ inputs.iou_distance_threshold }}"
            cat results/track2p_policy_emulation.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add DP comparison to job summary
        if: always() && hashFiles('results/policy_dp/policy_dp_comparison.md') != ''
        run: |
          {
            echo "## Track2p policy DP"
            cat results/policy_dp/policy_dp_comparison.md
            echo
            if [ -f results/policy_dp/policy_dp_viability.txt ]; then
              echo "\`\`\`"
              cat results/policy_dp/policy_dp_viability.txt
              echo "\`\`\`"
            fi
            if [ -f results/policy_dp/policy_dp_sweep_best.csv ]; then
              echo
              echo "Best compact DP sweep row:"
              echo "\`\`\`csv"
              cat results/policy_dp/policy_dp_sweep_best.csv
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always() && hashFiles('results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: track2p-policy-emulation-${{ inputs.transform_type }}-${{ inputs.threshold_method }}
          path: results/
          if-no-files-found: error
