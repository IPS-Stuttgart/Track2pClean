name: Track2p benchmark comparison

on:
  # checkov:skip=CKV_GHA_7: Manual benchmark workflow intentionally exposes bounded dispatch inputs and produces only benchmark artifacts.
  workflow_dispatch:
    inputs:
      publish_to_paper_repo:
        description: "Dispatch paper-repo build-results workflow to fetch this raw artifact"
        required: true
        type: boolean
        default: false
      data_path:
        description: "BayesCaTrack data directory"
        type: string
        default: track2p-data
        required: true
      max_gap:
        description: "Maximum session gap"
        type: string
        default: "2"
        required: true
      transform_type:
        description: "Registration transform for BayesCaTrack variants"
        type: choice
        options:
          - affine
          - rigid
          - fov-translation
          - none
        default: affine
        required: true
      include_non_cells:
        description: "Load all Suite2p stat.npy rows, including ROIs not marked as cells"
        type: boolean
        default: true
        required: true
      run_calibrated_loso:
        description: "Run calibrated leave-one-subject-out variant"
        type: boolean
        default: false
        required: true
      exclude_subjects:
        description: "Comma-separated manual-GT subjects to exclude because their GT ROI index space is incompatible with the public Suite2p subset"
        type: string
        default: jm038,jm039
        required: false
      python_version:
        description: "Python version"
        type: string
        default: "3.11"
        required: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install package and runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<3"
          python -m pip install -e ".[track2p]"

      - name: Show runner disk before data setup
        run: df -h

      - name: Restore or download BayesCaTrack data
        uses: ./.github/actions/setup-bayescatrack-data
        with:
          data_path: ${{ inputs.data_path }}
          cache_key: bayescatrack-webdav-${{ inputs.data_path }}-v1
          webdav_url: ${{ secrets.LONGITUDINALTRACKING_WEBDAV_URL }}
          webdav_user: ${{ secrets.LONGITUDINALTRACKING_DATA_KEY }}
          webdav_password: ${{ secrets.LONGITUDINALTRACKING_DATA_PASSWORD }}

      - name: Resolve benchmark paths and validate references
        id: paths
        env:
          DATA_PATH: ${{ inputs.data_path }}
          EXCLUDE_SUBJECTS: ${{ inputs.exclude_subjects }}
          RUN_CALIBRATED_LOSO: ${{ inputs.run_calibrated_loso }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import shutil
          from pathlib import Path

          root = Path(os.environ["DATA_PATH"]).resolve()
          out = Path("benchmark-ground-truth-subjects").resolve()
          excluded_by_user = {
              name.strip()
              for name in os.environ.get("EXCLUDE_SUBJECTS", "").split(",")
              if name.strip()
          }
          run_calibrated_loso = os.environ.get("RUN_CALIBRATED_LOSO", "false").lower() == "true"
          min_subjects = 2 if run_calibrated_loso else 1

          def is_subject(path: Path) -> bool:
              if not path.is_dir():
                  return False
              if (path / "track2p").exists():
                  return True
              return any(
                  (child / "suite2p" / "plane0").exists()
                  for child in path.iterdir()
                  if child.is_dir()
              )

          subjects = [path for path in root.rglob("*") if is_subject(path)]
          if subjects:
              parent = min((path.parent for path in subjects), key=lambda path: (len(path.parts), str(path)))
              subjects = [path for path in sorted(parent.iterdir()) if is_subject(path)]

          if out.exists():
              shutil.rmtree(out)
          out.mkdir()

          included = []
          excluded_no_gt = []
          excluded_incompatible = []
          for subject in subjects:
              gt = subject / "ground_truth.csv"
              if not gt.exists():
                  excluded_no_gt.append(subject.name)
                  continue
              if subject.name in excluded_by_user:
                  excluded_incompatible.append(subject.name)
                  continue
              target = out / subject.name
              target.mkdir()
              for item in subject.iterdir():
                  if item.name == "ground_truth.csv":
                      continue
                  os.symlink(item.resolve(), target / item.name, target_is_directory=item.is_dir())
              os.symlink(gt.resolve(), target / "ground_truth.csv")
              included.append(subject.name)

          if len(included) < min_subjects:
              raise SystemExit(
                  f"Need at least {min_subjects} usable manual-GT subject(s) after exclusions; "
                  f"included={included}, excluded_incompatible={sorted(excluded_incompatible)}"
              )

          print(f"data_root={out}")
          print(f"reference_root={out}")
          print("reference_kind=manual-gt")
          print(f"included={','.join(included)}")
          print(f"excluded_no_gt={','.join(excluded_no_gt)}")
          print(f"excluded_incompatible={','.join(sorted(excluded_incompatible))}")
          PY

      - name: Print benchmark input summary
        run: |
          echo "data_root=${{ steps.paths.outputs.data_root }}"
          echo "reference_root=${{ steps.paths.outputs.reference_root }}"
          echo "reference_kind=${{ steps.paths.outputs.reference_kind }}"
          echo "included=${{ steps.paths.outputs.included }}"
          echo "excluded_no_gt=${{ steps.paths.outputs.excluded_no_gt }}"
          echo "excluded_incompatible=${{ steps.paths.outputs.excluded_incompatible }}"
          echo "include_non_cells=${{ inputs.include_non_cells }}"

      - name: Run Track2p baseline
        env:
          INCLUDE_NON_CELLS: ${{ inputs.include_non_cells }}
        run: |
          mkdir -p results
          args=(
            benchmark track2p
            --data "${{ steps.paths.outputs.data_root }}"
            --reference "${{ steps.paths.outputs.reference_root }}"
            --reference-kind "${{ steps.paths.outputs.reference_kind }}"
            --method track2p-baseline
            --format csv
            --output results/track2p_baseline.csv
          )
          if [[ "$INCLUDE_NON_CELLS" == "true" ]]; then
            args+=(--include-non-cells)
          fi
          bayescatrack "${args[@]}"

      - name: Run registered-IoU global assignment
        env:
          INCLUDE_NON_CELLS: ${{ inputs.include_non_cells }}
        run: |
          args=(
            benchmark track2p
            --data "${{ steps.paths.outputs.data_root }}"
            --reference "${{ steps.paths.outputs.reference_root }}"
            --reference-kind "${{ steps.paths.outputs.reference_kind }}"
            --method global-assignment
            --cost registered-iou
            --transform-type "${{ inputs.transform_type }}"
            --max-gap "${{ inputs.max_gap }}"
            --format csv
            --output results/global_registered_iou_gap${{ inputs.max_gap }}.csv
          )
          if [[ "$INCLUDE_NON_CELLS" == "true" ]]; then
            args+=(--include-non-cells)
          fi
          bayescatrack "${args[@]}"

      - name: Run ROI-aware global assignment
        env:
          INCLUDE_NON_CELLS: ${{ inputs.include_non_cells }}
        run: |
          args=(
            benchmark track2p
            --data "${{ steps.paths.outputs.data_root }}"
            --reference "${{ steps.paths.outputs.reference_root }}"
            --reference-kind "${{ steps.paths.outputs.reference_kind }}"
            --method global-assignment
            --cost roi-aware
            --transform-type "${{ inputs.transform_type }}"
            --max-gap "${{ inputs.max_gap }}"
            --weighted-masks
            --weighted-centroids
            --format csv
            --output results/global_roi_aware_gap${{ inputs.max_gap }}.csv
          )
          if [[ "$INCLUDE_NON_CELLS" == "true" ]]; then
            args+=(--include-non-cells)
          fi
          bayescatrack "${args[@]}"

      - name: Run calibrated LOSO global assignment
        if: inputs.run_calibrated_loso
        env:
          INCLUDE_NON_CELLS: ${{ inputs.include_non_cells }}
        run: |
          args=(
            benchmark track2p
            --data "${{ steps.paths.outputs.data_root }}"
            --reference "${{ steps.paths.outputs.reference_root }}"
            --reference-kind "${{ steps.paths.outputs.reference_kind }}"
            --method global-assignment
            --cost calibrated
            --split leave-one-subject-out
            --transform-type "${{ inputs.transform_type }}"
            --max-gap "${{ inputs.max_gap }}"
            --format csv
            --output results/global_calibrated_loso_gap${{ inputs.max_gap }}.csv
          )
          if [[ "$INCLUDE_NON_CELLS" == "true" ]]; then
            args+=(--include-non-cells)
          fi
          bayescatrack "${args[@]}"

      - name: Aggregate benchmark comparison
        env:
          MAX_GAP: ${{ inputs.max_gap }}
          RUN_LOSO: ${{ inputs.run_calibrated_loso }}
        run: |
          args=(
            --input "Track2p=results/track2p_baseline.csv"
            --input "Global-IoU=results/global_registered_iou_gap${MAX_GAP}.csv"
            --input "ROI-aware=results/global_roi_aware_gap${MAX_GAP}.csv"
          )
          if [[ "$RUN_LOSO" == "true" ]]; then
            args+=(--input "Calibrated-LOSO=results/global_calibrated_loso_gap${MAX_GAP}.csv")
          fi
          bayescatrack benchmark compare "${args[@]}" --output results/comparison.md
          bayescatrack benchmark compare "${args[@]}" --format csv --output results/comparison.csv

      - name: Add comparison to job summary
        if: always() && hashFiles('results/comparison.md') != ''
        run: |
          {
            echo "## Track2p benchmark comparison"
            echo "Included usable manual-GT subjects: ${{ steps.paths.outputs.included }}"
            echo "Excluded subjects without GT: ${{ steps.paths.outputs.excluded_no_gt }}"
            echo "Excluded GT subjects with incompatible public ROI indices: ${{ steps.paths.outputs.excluded_incompatible }}"
            echo "include_non_cells: ${{ inputs.include_non_cells }}"
            echo "transform_type: ${{ inputs.transform_type }}"
            echo "run_calibrated_loso: ${{ inputs.run_calibrated_loso }}"
            cat results/comparison.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always() && hashFiles('results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: track2p-benchmark-comparison-gap${{ inputs.max_gap }}
          path: results/
          if-no-files-found: error

  dispatch-paper-results:
    name: Dispatch paper repository build
    needs: benchmark
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_paper_repo == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch paper repository build-results workflow
        env:
          PAPER_REPO_TOKEN: ${{ secrets.PAPER_REPO_TOKEN }}
          PAPER_REPO: FlorianPfaff/BayesCaTrackPaper
          SOURCE_REPO: IPS-Stuttgart/BayesCaTrack
          SOURCE_RUN_ID: ${{ github.run_id }}
          ARTIFACT_NAME: track2p-benchmark-comparison-gap${{ inputs.max_gap }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PAPER_REPO_TOKEN:-}" ]; then
            echo "::warning::publish_to_paper_repo=true but PAPER_REPO_TOKEN is not configured; skipping paper workflow dispatch"
            exit 0
          fi
          payload=$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "ref": "main",
              "inputs": {
                  "source_repo": os.environ["SOURCE_REPO"],
                  "source_run_id": os.environ["SOURCE_RUN_ID"],
                  "artifact_name": os.environ["ARTIFACT_NAME"],
              },
          }))
          PY
          )

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${PAPER_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PAPER_REPO}/actions/workflows/build-results.yml/dispatches" \
            -d "$payload"
