name: Static quality

on:
  push:
    branches:
      - main
    paths:
      - "src/bayescatrack/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/static-quality.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/bayescatrack/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/static-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  static-quality:
    name: Ruff and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: |
          poetry env use "$(which python)"
          poetry install --extras track2p

      - name: Run Ruff lint
        run: poetry run ruff check src/bayescatrack tests

      - name: Run Ruff format check
        run: poetry run ruff format --check src/bayescatrack tests

      - name: Run mypy type check
        continue-on-error: true
        run: poetry run mypy src/bayescatrack
