name: BayesCaTrack CI

on:
  push:
    branches:
      - main
    paths:
      - "src/bayescatrack/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "README.md"
      - ".github/scripts/**"
      - ".github/workflows/bayescatrack-ci.yml"
      - ".github/workflows/track2p-benchmark.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/bayescatrack/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "README.md"
      - ".github/scripts/**"
      - ".github/workflows/bayescatrack-ci.yml"
      - ".github/workflows/track2p-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  tests-and-export:
    name: Tests + export smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: |
          poetry env use "$(which python)"
          poetry lock --no-interaction
          poetry install --extras track2p

      - name: Run test suite
        run: |
          mkdir -p test-results
          poetry run python -m pytest \
            --rootdir . \
            -q \
            --strict-config \
            --junitxml=test-results/junit-py${{ matrix.python-version }}.xml \
            tests

      - name: Create synthetic Track2p-style subject
        run: |
          poetry run python - <<'PY'
          from pathlib import Path
          import numpy as np

          plane_dir = Path("ci_smoke/jm123/2024-05-01_a/data_npy/plane0")
          plane_dir.mkdir(parents=True, exist_ok=True)

          roi_masks = np.zeros((1, 2, 2), dtype=bool)
          roi_masks[0, 0, 1] = True

          np.save(plane_dir / "rois.npy", roi_masks)
          np.save(plane_dir / "F.npy", np.array([[1.0, 2.0, 3.0]], dtype=float))
          np.save(plane_dir / "fov.npy", np.ones((2, 2), dtype=float))
          PY

      - name: Run summary command
        run: |
          poetry run python -m bayescatrack \
            summary ci_smoke/jm123 --plane plane0 > summary.json
          cat summary.json

      - name: Run export command
        run: |
          poetry run python -m bayescatrack \
            export ci_smoke/jm123 ci_smoke/jm123_plane0.npz \
            --plane plane0 > export-summary.json
          cat export-summary.json

      - name: Validate exported archive
        run: |
          poetry run python - <<'PY'
          import json
          from pathlib import Path
          import numpy as np

          summary = json.loads(Path("summary.json").read_text())
          export_summary = json.loads(Path("export-summary.json").read_text())

          assert summary["n_sessions"] == 1
          assert export_summary["n_sessions"] == 1

          exported = np.load("ci_smoke/jm123_plane0.npz", allow_pickle=True)
          required_keys = {
              "session_0__measurements",
              "session_0__state_means",
              "session_0__state_covariances",
          }
          missing = required_keys.difference(exported.files)
          assert not missing, f"missing keys: {sorted(missing)}"

          assert exported["session_0__measurements"].shape == (2, 1)
          assert exported["session_0__state_means"].shape == (4, 1)
          assert exported["session_0__state_covariances"].shape == (4, 4, 1)

          print("Archive keys:", sorted(exported.files))
          PY

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-py${{ matrix.python-version }}
          path: test-results/junit-py${{ matrix.python-version }}.xml

      - name: Upload smoke-test artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: bayescatrack-smoke-export
          path: |
            ci_smoke/jm123_plane0.npz
            summary.json
            export-summary.json

  package-smoke:
    name: Build package and run module entry point
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install built wheel with dependencies
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import subprocess
          import sys

          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {wheels}")
          subprocess.check_call(
              [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--force-reinstall",
                  f"{wheels[0]}[track2p]",
              ]
          )
          PY

      - name: Verify module entry point from built package
        run: |
          python -m bayescatrack --help > /dev/null

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bayescatrack-package-dist
          path: dist/*

  publish-results:
    name: Publish unit test results
    needs:
      - tests-and-export
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: test-results

      - name: Publish test results
        if: (!cancelled())
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/**/*.xml"
          comment_mode: off
          compare_to_earlier_commit: false
